<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Personal photo and video gallery — browse your memories from any device">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Header -->
  <header id="app-header" class="header">
    <div class="header-content">
      <div class="header-left">
        <h1 class="header-title">Gallery</h1>
        <span id="stats-badge" class="stats-badge">—</span>
      </div>
      <button id="scan-btn" class="icon-btn" title="Rescan media">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
      </button>
    </div>

    <!-- Filter Tabs -->
    <nav class="filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="photo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        Photos
      </button>
      <button class="filter-tab" data-filter="video">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Videos
      </button>
    </nav>
  </header>

  <!-- Gallery Grid -->
  <main id="gallery" class="gallery">
    <!-- Items injected by JS -->
  </main>

  <!-- Loading indicator -->
  <div id="loader" class="loader">
    <div class="loader-spinner"></div>
    <p class="loader-text">Loading...</p>
  </div>

  <!-- Empty state -->
  <div id="empty-state" class="empty-state hidden">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>
    </svg>
    <p>No media found</p>
    <button onclick="triggerScan()" class="btn-primary">Scan for media</button>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox hidden">
    <div class="lightbox-backdrop"></div>
    <div class="lightbox-content">
      <div id="lightbox-media" class="lightbox-media">
        <!-- Photo or video rendered here -->
      </div>
      <div class="lightbox-info" id="lightbox-info">
        <span id="lightbox-name" class="lightbox-name"></span>
        <span id="lightbox-meta" class="lightbox-meta"></span>
      </div>
    </div>
    <button id="lightbox-close" class="lightbox-close" aria-label="Close">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button id="lightbox-prev" class="lightbox-nav lightbox-prev-btn" aria-label="Previous">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button id="lightbox-next" class="lightbox-nav lightbox-next-btn" aria-label="Next">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div id="lightbox-counter" class="lightbox-counter"></div>
  </div>

  <!-- Scan progress overlay -->
  <div id="scan-overlay" class="scan-overlay hidden">
    <div class="scan-card">
      <div class="scan-spinner"></div>
      <p class="scan-text">Scanning media...</p>
      <p class="scan-sub">This may take a few minutes</p>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
